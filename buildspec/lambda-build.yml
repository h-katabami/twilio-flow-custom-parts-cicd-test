version: 0.2

phases:
  build:
    commands:
      - set -euo pipefail
      - REPO_NAME=${APP_REPO_NAME:-twilio-flow-custom-parts-cicd-test}
      - BUILD_BUCKET=${BUILD_ARTIFACT_BUCKET}
      - BUILD_PREFIX=build/${REPO_NAME}/${DEPLOY_ENV}/lambda/guidance-handler
      - ARCHIVE_NAME=${CODEBUILD_RESOLVED_SOURCE_VERSION}.zip
      - mkdir -p artifacts/package artifacts/metadata
      - cd lambdas/GuidanceHandler
      - zip -r ../../artifacts/package/guidance-handler.zip .
      - cd ../..
      - aws s3 cp artifacts/package/guidance-handler.zip s3://${BUILD_BUCKET}/${BUILD_PREFIX}/${ARCHIVE_NAME}
      - HASH=$(openssl dgst -sha256 -binary artifacts/package/guidance-handler.zip | openssl enc -base64)
      - printf 'LAMBDA_ARTIFACT_BUCKET=%s\nLAMBDA_ARTIFACT_KEY=%s\nLAMBDA_SOURCE_CODE_HASH=%s\n' "$BUILD_BUCKET" "$BUILD_PREFIX/$ARCHIVE_NAME" "$HASH" > artifacts/metadata/lambda.env

artifacts:
  files:
    - artifacts/package/guidance-handler.zip
    - artifacts/metadata/lambda.env