version: 0.2

phases:
  install:
    commands:
      - set -euo pipefail
      - test -f "$CODEBUILD_SRC_DIR_LambdaBuild/artifacts/metadata/lambda.env"
      - . "$CODEBUILD_SRC_DIR_LambdaBuild/artifacts/metadata/lambda.env"
  build:
    commands:
      - cd infra/terraform/envs/${DEPLOY_ENV}
      - terraform init -reconfigure
      - terraform fmt -check
      - terraform validate
      - terraform plan -out=tfplan -var="lambda_artifact_bucket=${LAMBDA_ARTIFACT_BUCKET}" -var="lambda_artifact_key=${LAMBDA_ARTIFACT_KEY}" -var="lambda_source_code_hash=${LAMBDA_SOURCE_CODE_HASH}"
      - terraform show -no-color tfplan > tfplan.txt

artifacts:
  files:
    - infra/terraform/envs/${DEPLOY_ENV}/tfplan
    - infra/terraform/envs/${DEPLOY_ENV}/tfplan.txt